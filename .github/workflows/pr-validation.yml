
name: PR Validation

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
          requireScope: false
        continue-on-error: true

      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q '<<<<<<<'; then
            echo "⚠️ Merge conflicts detected"
            exit 1
          fi

      - name: Check file sizes
        run: |
          large_files=$(find . -type f -size +10M -not -path "./.git/*" -not -path "./node_modules/*")
          if [ -n "$large_files" ]; then
            echo "⚠️ Large files detected (>10MB):"
            echo "$large_files"
            exit 1
          fi

      - name: PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const summary = `
            ## 📊 PR Summary
            
            - **Branch**: \`${pr.head.ref}\` → \`${pr.base.ref}\`
            - **Files Changed**: ${pr.changed_files}
            - **Additions**: +${pr.additions}
            - **Deletions**: -${pr.deletions}
            - **Commits**: ${pr.commits}
            
            ### ✅ Automated Checks
            - Backend CI will run if backend files changed
            - Frontend CI will run if frontend files changed
            - All checks must pass before merge
            `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

  check-status:
    name: Check All CI Status
    runs-on: ubuntu-latest
    needs: validate-pr
    if: always()
    
    steps:
      - name: Check required workflows
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });
            
            const requiredChecks = ['Backend CI', 'Frontend CI'];
            const failedChecks = checks.check_runs
              .filter(check => requiredChecks.includes(check.name))
              .filter(check => check.conclusion === 'failure');
            
            if (failedChecks.length > 0) {
              core.setFailed(`❌ Some required checks failed: ${failedChecks.map(c => c.name).join(', ')}`);
            }
