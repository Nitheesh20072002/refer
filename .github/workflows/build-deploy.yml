
name: Build Docker Images

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: referloop-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false  # Set to true when you have a registry
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment when you have a Docker registry
      # - name: Login to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: your-registry.com
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      
      # - name: Push to registry
      #   run: docker push ${{ steps.meta.outputs.tags }}

  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: referloop-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          push: false  # Set to true when you have a registry
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment when you have a Docker registry
      # - name: Login to Docker Registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: your-registry.com
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      
      # - name: Push to registry
      #   run: docker push ${{ steps.meta.outputs.tags }}
