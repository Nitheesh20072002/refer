name: Build and Push Docker Images to GCR

on:
  push:
    branches: [main, master, develop]
  workflow_dispatch:  # Allow manual trigger

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}

jobs:
  build-backend:
    name: Build and Push Backend to GCR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true
      
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker
      
      - name: Build Backend Docker Image
        run: |
          cd backend
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:${{ github.sha }} .
          docker tag gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:${{ github.sha }} gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:latest
      
      - name: Push Backend Images to GCR
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:latest
      
      - name: Output Backend Image URL
        run: |
          echo "✅ Backend image pushed to GCR:"
          echo "gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-backend:latest"

  build-frontend:
    name: Build and Push Frontend to GCR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true
      
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker
      
      - name: Build Frontend Docker Image
        run: |
          cd frontend
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            -t gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:${{ github.sha }} .
          docker tag gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:${{ github.sha }} gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:latest
      
      - name: Push Frontend Images to GCR
        run: |
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:latest
      
      - name: Output Frontend Image URL
        run: |
          echo "✅ Frontend image pushed to GCR:"
          echo "gcr.io/${{ env.GCP_PROJECT_ID }}/referloop-frontend:latest"
          echo ""
          echo "⚠️  Note: After deploying backend, update this workflow with:"
          echo "NEXT_PUBLIC_API_URL=https://your-backend-url.run.app"
