version: '3.8'

services:
  # Nginx Reverse Proxy (The Entry Point)
  nginx:
    image: nginx:alpine
    container_name: referloop_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - referloop-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: referloop_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: referloop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - referloop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API
  api:
    build: ./backend
    container_name: referloop_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: referloop
      GIN_MODE: release # Set to release for production
      JWT_SECRET: your-super-secret-key
      FRONTEND_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - referloop-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: referloop_frontend
    environment:
      # This is for runtime, but NEXT_PUBLIC_ vars are baked in at build time
      NEXT_PUBLIC_API_URL: /api
    deploy:
      resources:
        limits:
          memory: 4G  # Increased for Next.js build
        reservations:
          memory: 2G
    networks:
      - referloop-network
    shm_size: '2gb'  # Increase shared memory

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: referloop_pgweb
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Use the newer variable name
      - PGWEB_DATABASE_URL=postgres://postgres:postgres@postgres:5432/referloop?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - referloop-network

networks:
  referloop-network:
    driver: bridge

volumes:
  postgres_data:
