
version: '3.8'

# Development-specific services and overrides
# Run with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  # MailHog - Email Testing Tool (Dev Only)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: referloop_mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - referloop-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  # pgweb - Database Web UI (Dev Only)
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: referloop_pgweb
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://postgres:postgres@postgres:5432/referloop?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - referloop-network

  # Override API for development
  api:
    environment:
      # Email Configuration (MailHog)
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@referloop.com
      SMTP_TLS: "false"
      
      # Development mode
      GIN_MODE: debug
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_healthy

  # Override Postgres to expose port for local access
  postgres:
    ports:
      - "5432:5432"
